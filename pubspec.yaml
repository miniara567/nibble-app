name: viral_recipes_app
description: Flutter client for aggregating viral recipes from social media.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.1
  dio: ^5.4.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  video_player: ^2.9.1
  chewie: ^1.7.0
  cached_network_image: ^3.3.1
  firebase_core: ^2.27.1
  firebase_analytics: ^10.7.0
  firebase_remote_config: ^4.4.4
  intl: ^0.20.2
  equatable: ^2.0.5
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  golden_toolkit: ^0.15.0
  integration_test:
    sdk: flutter
  mocktail: ^1.0.2
  riverpod_test: ^0.1.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
